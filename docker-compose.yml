version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_network

  embedding_service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - EMBEDDING_SERVICE_PORT=8100
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./logs/embedding:/app/logs
    command: python embedding_service_api/main.py
    networks:
      - app_network
    restart: unless-stopped

  # Example domain services - add more as needed
  domain_service_1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DOMAIN_1_PORT:-8001}:${DOMAIN_1_PORT:-8001}"
    environment:
      - DOMAIN_NAME=${DOMAIN_1_NAME:-hr}
      - SERVICE_PORT=${DOMAIN_1_PORT:-8001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
      embedding_service:
        condition: service_started
    volumes:
      - ./:/app
      - ./logs/${DOMAIN_1_NAME:-hr}:/app/logs
    command: python start_domain_service.py ${DOMAIN_1_NAME:-hr} --port ${DOMAIN_1_PORT:-8001}
    networks:
      - app_network
    restart: unless-stopped

  domain_service_2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DOMAIN_2_PORT:-8002}:${DOMAIN_2_PORT:-8002}"
    environment:
      - DOMAIN_NAME=${DOMAIN_2_NAME:-it}
      - SERVICE_PORT=${DOMAIN_2_PORT:-8002}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
      embedding_service:
        condition: service_started
    volumes:
      - ./:/app
      - ./logs/${DOMAIN_2_NAME:-it}:/app/logs
    command: python start_domain_service.py ${DOMAIN_2_NAME:-it} --port ${DOMAIN_2_PORT:-8002}
    networks:
      - app_network
    restart: unless-stopped

  # Add more domain services as needed by copying the pattern above

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge